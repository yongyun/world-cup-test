<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>ECS Async Load Test</title>
</head>

<body>
  <h1>Async Load Test</h1>
  <script src="../dist/runtime.js"></script>
  <script>
    const bigIntPrinter = (value) => `${value}n`

    const jsonReplacer = (_, value) => (
      (typeof value === 'bigint') ? bigIntPrinter(value) : value
    )

    const log = (...args) => {
      const text = args
        .map(e => ((typeof e === 'string') ? e : JSON.stringify(e, jsonReplacer)))
        .join(' ')

      document.body.appendChild(Object.assign(document.createElement('p'), {textContent: text}))
    }

    if (!window.ecs) {
      log('Fail: ECS not found')
    } else {
      log('Success: ECS found')
    }
  </script>
</body>

</html>
