<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.001; filterBeta: 0.01; warmupTolerance: 5; missTolerance: 5"
      color-space="sRGB"
      renderer="colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <img id="overlay-img" src="./overlay.png"/>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-image id="ar-img" src="#overlay-img" position="0 0 0" width="1" height="1"></a-image>
      </a-entity>

    </a-scene>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const sceneEl = document.querySelector("a-scene");

        sceneEl.addEventListener("loaded", () => {
          const target = document.querySelector("[mindar-image-target]");
          let found = false;

          target.addEventListener("targetFound", () => {
            found = true;
          });

          target.addEventListener("targetLost", () => {
            // 找到過一次之後，就算失去追蹤也不隱藏
            if (found) {
              const arImg = document.getElementById("ar-img");
              arImg.setAttribute("visible", "true");
              // 強制讓 entity 保持顯示
              target.object3D.visible = true;
            }
          });
        });
      });
    </script>
  </body>
</html>
