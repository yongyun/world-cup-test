<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.001; filterBeta: 0.01; warmupTolerance: 5; missTolerance: 99999"
      color-space="sRGB"
      renderer="colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-image id="ar-image" src="./overlay.png" position="0 0 0" width="1" height="1" visible="false"></a-image>
      </a-entity>

      <!-- 辨識後圖片會移到這裡，固定在螢幕中央 -->
      <a-entity id="fixed-overlay" position="0 0 -2" visible="false">
        <a-image src="./overlay.png" width="1.5" height="1.5"></a-image>
      </a-entity>

    </a-scene>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const target = document.querySelector("[mindar-image-target]");
        const fixedOverlay = document.getElementById("fixed-overlay");

        // 辨識到封面時，顯示固定在螢幕上的圖片
        target.addEventListener("targetFound", () => {
          fixedOverlay.setAttribute("visible", "true");
        });
      });
    </script>
  </body>
</html>
