<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #ui {
        position: absolute; top: 20px; left: 20px; z-index: 10;
        color: white; font-family: sans-serif; background: rgba(0,0,0,0.5); padding: 10px;
      }
    </style>
  </head>
  <body>
    <div id="ui">請對準雜誌封面...</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; maxTrack: 1; filterMinCF:0.001; filterBeta: 0.01;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-image id="ar-object" src="./overlay.png" position="1.2 0 0" height="1" width="1"></a-image>
      </a-entity>
    </a-scene>

    <script>
      const targetEl = document.querySelector('#target');
      const uiEl = document.querySelector('#ui');
      const arObj = document.querySelector('#ar-object');

      // 監聽「認到目標」事件
      targetEl.addEventListener("targetFound", event => {
        uiEl.innerHTML = "已辨識！現在你可以移開鏡頭了。";
        console.log("Found!");
      });

      // 關鍵：監聽「目標消失」事件，但強制讓物件保持顯示
      targetEl.addEventListener("targetLost", event => {
        // 我們不讓它隱藏，物件會停在最後一次看見的位置
        // 注意：WebAR 在失去追蹤後，位置可能會有些許飄移，這是目前的技術限制
        uiEl.innerHTML = "追蹤已固定";
      });
    </script>
  </body>
</html>
